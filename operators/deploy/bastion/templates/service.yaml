apiVersion: v1
kind: Service
metadata:
  name: {{ include "bastion.fullname" . }}
  labels:
    {{- with .Values.serviceLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "bastion.labels" . | nindent 4 }}
{{- with .Values.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: ssh
      protocol: TCP
      name: ssh
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  selector:
    {{- include "bastion.selectorLabels" . | nindent 4 }}

---

{{- if .Values.webssh.service }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bastion.fullname" . }}-webssh
  labels:
    {{- include "webssh.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webssh.service.type }}
  ports:
    - port: {{ .Values.webssh.service.port }}
      targetPort: {{ .Values.webssh.service.targetPort }}
      protocol: TCP
      name: webssh
  selector:
    {{- include "webssh.selectorLabels" . | nindent 4 }}
{{- end }}
