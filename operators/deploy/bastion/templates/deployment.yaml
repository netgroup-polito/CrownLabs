apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bastion.fullname" . }}
  labels:
    {{- include "bastion.labels" . | nindent 4 }}
{{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bastion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
    {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      labels:
        {{- include "bastion.selectorLabels" . | nindent 8 }}
        {{- include "bastion.metricsAdditionalLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "bastion.fullname" . }}
      initContainers:
        - name: conntrack-enabler
          image: {{ .Values.image.conntrackEnablerImage }}
          securityContext:
            {{- toYaml .Values.securityContexts.connTrackEnabler | nindent 12 }}
          command:
            - sh
            - -c
            - |
              apk add --no-cache iptables
              iptables -I OUTPUT 1 -p tcp --dport 22 -m conntrack --ctstate NEW,ESTABLISHED -j ACCEPT
              iptables-save
          resources:
            {{- toYaml .Values.resources.connTrackEnabler | nindent 12 }}
      containers:
        - name: {{ .Chart.Name }}-sshd
          securityContext:
            {{- toYaml .Values.securityContexts.bastion | nindent 12 }}
          command: ["/usr/sbin/sshd"]
          args: ["-D", "-e", "-f","/etc/ssh/sshd_config_custom"]
          image: "{{ .Values.image.repositoryBastion }}:{{ include "bastion.version" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - mountPath: /home/bastion/.ssh
              name: authorized-keys
            - mountPath: /host-keys
              name : host-keys
          resources:
            {{- toYaml .Values.resources.bastion | nindent 12 }}
        - name: {{ .Chart.Name }}-operator
          securityContext:
            {{- toYaml .Values.securityContexts.operator | nindent 12 }}
          image: "{{ .Values.image.repositoryOperator }}:{{ include "bastion.version" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: probes
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: probes
            initialDelaySeconds: 3
            periodSeconds: 3
          volumeMounts:
            - name: authorized-keys
              mountPath: /auth-keys-vol
          resources:
            {{- toYaml .Values.resources.operator | nindent 12 }}
      volumes:
        - name: authorized-keys
          emptyDir: {}
        - name: host-keys
          secret:
            secretName: {{ .Values.sshKeysSecret.name }}
            defaultMode: 0444
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "bastion.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bastion.fullname" . }}-webssh
  labels:
    {{- include "webssh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "webssh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bastion.metricsAdditionalLabels" . | nindent 8 }}
        {{- include "webssh.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: webssh
          image: "{{ .Values.image.repositoryWebSSH  }}:{{ include "bastion.version" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              protocol: TCP
              containerPort: {{ .Values.webssh.config.webSocketPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          volumeMounts:
            - mountPath: /web-keys
              name: web-keys
          resources:
            {{- toYaml .Values.resources.webssh | nindent 12 }}
          args:
            - "--websshuser={{ .Values.webssh.config.user }}"
            - "--websshprivatekeypath=/web-keys/{{ .Values.webssh.masterKey.name }}"
            - "--websshmaxconncount={{ .Values.webssh.config.maxConnCount }}"
            - "--websshvmport={{ .Values.webssh.config.vmPort }}"
            - "--websshwebsocketport={{ .Values.webssh.config.webSocketPort }}"
      volumes:
        - name: web-keys
          secret:
            secretName: {{ .Values.webssh.masterKey.secretName }}
            defaultMode: 0444
