apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "image-list.fullname" . }}-configmap
  namespace: {{ .Values.configMap.namespace }}
  labels:
    {{- include "image-list.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - {{ .Values.configMap.name }}
  verbs:
  - get
