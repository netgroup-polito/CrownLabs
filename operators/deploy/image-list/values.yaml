# Default values for image-list.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# CronJob scheduling configuration
schedule: "*/1 * * * *"
startingDeadlineSeconds: 60

# ConfigMap configuration
configMap:
  name: registry-configuration-image-list-update
  namespace: crownlabs-staging-988

# Registry configurations
registries:
  - name: docker-registry
    type: docker
    url: http://docker-registry.docker-registry:5000
    advertised: registry.internal.crownlabs.polito.it
    username: ""
    password: ""
    imageListName: crownlabs-virtual-machine-images-test
  - name: harbor-registry
    type: harbor
    url: http://harbor-registry.harbor-registry:8080
    advertised: harbor.crownlabs.polito.it
    username: ""
    password: ""
    imageListName: harbor-containerdisks-imagelist-test
    project: crownlabs-containerdisks-test
  - name: harbor-registry-2
    type: harbor
    url: http://harbor-registry.harbor-registry:8080
    advertised: harbor.crownlabs.polito.it
    username: ""
    password: ""
    imageListName: harbor-standalone-imagelist-test
    project: crownlabs-standalone-test


image:
  repository: crownlabs/crownlabs-image-list
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart version.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

deploymentAnnotations: {}
podAnnotations: {}

securityContext:
  capabilities:
    drop:
    - ALL
  privileged: false
  runAsNonRoot: true
  runAsUser: 100000
  runAsGroup: 100000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    cpu: 1000m
    memory: 200Mi

rbacResourcesName: crownlabs-image-list
