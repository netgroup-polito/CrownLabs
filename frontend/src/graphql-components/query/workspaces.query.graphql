query workspaces($labels: String) {
  workspaces: itPolitoCrownlabsV1alpha1WorkspaceList(labelSelector: $labels) {
    items {
      metadata {
        name
        deletionTimestamp
      }
      spec {
        prettyName
        autoEnroll
        quota {
          cpu
          memory
          instances
        }
      }
    }
  }
}
