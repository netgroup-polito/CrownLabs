query tenants($labels: String, $retrieveWorkspaces: Boolean = false) {
  tenants: itPolitoCrownlabsV1alpha2TenantList(labelSelector: $labels) {
    items {
      metadata {
        name
        creationTimestamp
        labels
      }
      spec {
        firstName
        lastName
        email
        lastLogin
        workspaces @include(if: $retrieveWorkspaces) {
          role
          name
        }
      }
    }
  }
}
