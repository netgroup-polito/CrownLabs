query workspaceTemplates($workspaceNamespace: String!) {
  templateList: itPolitoCrownlabsV1alpha2TemplateList(
    namespace: $workspaceNamespace
  ) {
    templates: items {
      spec {
        prettyName
        description
        allowPublicExposure
        cleanup {
          deleteAfterCreation
          stopAfterInactivity
          deleteAfterInactivity
        }
        nodeSelector
        environmentList {
          name
          environmentType
          mountMyDriveVolume
          image
          guiEnabled
          disableControls
          rewriteURL
          persistent
          containerStartupOptions{
            sourceArchiveURL
            contentPath
            startupArgs
            enforceWorkdir
          }
          mountMyDriveVolume
          resources {
            cpu
            disk
            memory
            reservedCPUPercentage
          }
          sharedVolumeMounts {
            sharedVolume {
              name
              namespace
            }
            mountPath
            readOnly
          }
        }
        workspaceCrownlabsPolitoItWorkspaceRef {
          name
        }
      }
      metadata {
        name
        namespace
      }
    }
  }
}
