{{- if .Values.global.gatewayApiMode }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gatewayAPI.name }}
  {{- with .Values.gatewayAPI.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayAPI.class}}
  listeners:
    - name: {{ .Values.gatewayAPI.listenerName }}
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gatewayAPI.hostname }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ .Values.gatewayAPI.tls.certificateRefName }}
      {{- if .Values.gatewayAPI.allowedRoutesSimple }}
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              {{ .Values.gatewayAPI.allowedRoutesSimple.key }}: {{ .Values.gatewayAPI.allowedRoutesSimple.value }}
      {{- else if .Values.gatewayAPI.allowedRoutes }}
      allowedRoutes:
        {{- toYaml .Values.gatewayAPI.allowedRoutes | nindent 8 }}
      {{- end }}
{{- end }}
